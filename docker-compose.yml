services:
  api:
    build: .
    container_name: thyrax_api
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./thyrax.db:/app/thyrax.db
      - ./data/vector_store:/app/data/vector_store
      - ./models/compressed:/app/models/compressed
      - ./mlflow.db:/app/mlflow.db
    restart: always

  frontend:
    build: .
    container_name: thyrax_frontend
    command: streamlit run frontend/app.py --server.address 0.0.0.0
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: always

  mlflow:
    build: .
    container_name: thyrax_mlflow
    command: mlflow ui --backend-store-uri sqlite:///./mlflow.db --host 0.0.0.0 --port 5000
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./mlruns:/app/mlruns
    restart: always